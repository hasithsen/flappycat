<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#7ed4ff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="FlappyCat — a Flappy-Bird-style game built with Phaser 3, but with a cat." />
  <title>FlappyCat</title>

  <link rel="icon" href="assets/cat.svg" type="image/svg+xml" />

  <style>
    :root { color-scheme: light dark; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0c1622;
      color: #e8f7ff;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
              user-select: none;
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    #game {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(ellipse at top, #1a3552 0%, #0c1622 70%);
    }

    /* Phaser injects its canvas inside #game; SHOW scale handles sizing. */
    #game canvas {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.45);
      border-radius: 6px;
    }

    /* Pre-Phaser loading splash */
    #splash {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      gap: 16px;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #splash.hidden { opacity: 0; }
    #splash .ring {
      width: 56px; height: 56px; border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #ffae3a;
      animation: spin 0.9s linear infinite;
    }
    #splash .label {
      font-weight: 700;
      letter-spacing: 0.18em;
      opacity: 0.7;
      font-size: 12px;
      text-transform: uppercase;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #fatal {
      position: fixed; inset: 0; display: none; place-items: center; padding: 24px;
      background: rgba(12,22,34,0.96);
      text-align: center;
    }
    #fatal.show { display: grid; }
    #fatal h1 { margin: 0 0 8px; font-size: 20px; }
    #fatal p  { margin: 0; opacity: 0.8; max-width: 480px; }
    #fatal code { background: rgba(255,255,255,0.08); padding: 1px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="game" aria-label="FlappyCat game canvas" role="application"></div>

  <div id="splash" aria-hidden="true">
    <div class="ring"></div>
    <div class="label">Loading FlappyCat…</div>
  </div>

  <div id="fatal" role="alert" aria-live="assertive">
    <div>
      <h1>Could not load Phaser</h1>
      <p>
        Check your internet connection, or drop a local copy of
        <code>phaser.min.js</code> into <code>lib/</code> and update the
        <code>&lt;script&gt;</code> tag in <code>index.html</code>.
      </p>
    </div>
  </div>

  <!-- Phaser 3 (CDN). Pinned for reproducibility. -->
  <script
    src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
    onerror="document.getElementById('fatal').classList.add('show'); document.getElementById('splash').classList.add('hidden');">
  </script>

  <!-- Game source. Loaded in dependency order. -->
  <script src="js/config.js"></script>
  <script src="js/scenes/BootScene.js"></script>
  <script src="js/scenes/PreloadScene.js"></script>
  <script src="js/scenes/MenuScene.js"></script>
  <script src="js/scenes/GameScene.js"></script>
  <script src="js/scenes/GameOverScene.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
