<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 24" width="64" height="24">
  <!-- Halo placeholder. Replace with your own celestial flourish. -->
  <defs>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#fff8b8" stop-opacity="0"/>
      <stop offset="0.6" stop-color="#ffe071" stop-opacity="0.45"/>
      <stop offset="1"   stop-color="#ffae3a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soft outer glow -->
  <ellipse cx="32" cy="12" rx="30" ry="11" fill="url(#glow)"/>

  <!-- Stacked stroked rings: three layers fake a soft glow without filters. -->
  <ellipse cx="32" cy="12" rx="22" ry="6" fill="none" stroke="#ffae3a" stroke-width="6" opacity="0.55"/>
  <ellipse cx="32" cy="12" rx="22" ry="6" fill="none" stroke="#fff2a8" stroke-width="3"/>
  <ellipse cx="32" cy="12" rx="22" ry="6" fill="none" stroke="#ffffff" stroke-width="1"/>
</svg>
